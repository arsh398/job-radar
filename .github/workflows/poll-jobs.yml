name: poll-jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      max_llm:
        description: "LLM calls per run (default 20)"
        type: string
        default: "20"
      max_per_company:
        description: "Max jobs per company (default 3)"
        type: string
        default: "3"
      wipe_seen:
        description: "Clear seen.json so all current jobs re-fire"
        type: boolean
        default: false

concurrency:
  group: job-radar
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium for Puppeteer
        run: pnpm exec puppeteer browsers install chrome

      - name: Wipe seen.json (backfill mode)
        if: ${{ inputs.wipe_seen == true }}
        run: echo '{}' > seen.json

      - name: Run job-radar
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          MAX_LLM_PER_RUN: ${{ inputs.max_llm || '40' }}
          MAX_PER_COMPANY: ${{ inputs.max_per_company || '8' }}
          ALERT_SKIPS: '1'
          ENABLE_PDF: '1'
          ENABLE_TELEGRAM: '0'
          ENABLE_NOTION: '1'
        run: pnpm start

      - name: Commit state
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain seen.json source_health.json 2>/dev/null)" ]; then
            git add seen.json source_health.json
            git commit -m "chore(state): update seen + health [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
