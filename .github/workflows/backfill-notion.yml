name: backfill-notion

# One-time / on-demand backfill of existing Notion rows with Phase 1
# fields (Prefill Data, Prompt Version, Resume Variant, Quality
# Warnings, refreshed Verdict + Fit). Processes rows in batches of
# MAX_BACKFILL_PER_RUN (default 60) — re-run until "skipped" count
# equals "seen" count, meaning every row has Prefill Data.
#
# Idempotent: rows that already have Prefill Data are skipped unless
# you set FORCE_BACKFILL=1.
#
# Preserves Status / Applied At / Response Type / Response At — those
# properties are not touched.

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: "Max rows to process per run (default 60)"
        type: string
        default: "60"
      force:
        description: "Force re-backfill even if Prefill Data exists"
        type: boolean
        default: false

concurrency:
  group: backfill-notion
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Backfill existing rows
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          MAX_BACKFILL_PER_RUN: ${{ inputs.max_per_run || '60' }}
          FORCE_BACKFILL: ${{ inputs.force && '1' || '0' }}
        run: pnpm exec tsx scripts/backfill-notion.ts
